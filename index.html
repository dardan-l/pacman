<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    .header {
      display: flex;
      justify-content: space-between;
      width: 448px;
      padding: 12px 0;
      font-size: 18px;
    }
    .score { color: #fff; }
    .lives { color: #ffff00; }
    canvas {
      border: 2px solid #2121de;
      display: block;
    }
    .overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 24px;
      color: #ffff00;
    }
    .overlay .sub {
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="score">SCORE: <span id="score">0</span></div>
    <div class="lives" id="lives"></div>
  </div>
  <div style="position: relative; display: flex; align-items: center; justify-content: center;">
    <canvas id="game" width="448" height="496"></canvas>
    <div class="overlay" id="overlay">
      <div>PAC-MAN</div>
      <div class="sub">Press any key or tap to start</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');

const TILE = 16;
const COLS = 28;
const ROWS = 31;

// 0=wall, 1=dot, 2=empty, 3=power pellet, 4=ghost house
const MAP = [
  "0000000000000000000000000000",
  "0111111111111001111111111110",
  "0100001000010010100001000010",
  "0300001000010010100001000030",
  "0100001000010010100001000010",
  "0111111111111111111111111110",
  "0100001001000000010010000010",
  "0100001001000000010010000010",
  "0111111001111001111001111110",
  "0000001010002002001010000000",
  "2222201010002002001010222222",
  "0000001002000000002001000000",
  "2222201002004440002001022222",
  "0000001002040440402001000000",
  "2222202002040440402002022222",
  "0000001002040440402001000000",
  "2222201002000000002001022222",
  "0000001002000000002001000000",
  "2222201002111111112001022222",
  "0000001002100000012001000000",
  "0111111111100000011111111110",
  "0100001000111001110001000010",
  "0300001000010010100001000030",
  "0110011111110010111111001100",
  "0010010010000000001001001000",
  "0010010010000000001001001000",
  "0111111010111001110101111110",
  "0100000010010010100100000010",
  "0100000010010010100100000010",
  "0111111111111111111111111110",
  "0000000000000000000000000000",
];

let grid = [];
let score = 0;
let lives = 3;
let totalDots = 0;
let dotsEaten = 0;
let gameState = 'waiting'; // waiting, playing, won, lost
let ghostFrightened = 0;

function buildGrid() {
  grid = [];
  totalDots = 0;
  dotsEaten = 0;
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      const ch = MAP[r][c];
      grid[r][c] = parseInt(ch);
      if (ch === '1' || ch === '3') totalDots++;
    }
  }
}

// Pac-Man
let pac = { x: 14, y: 23, dir: 'left', nextDir: 'left', moving: true, mouthAngle: 0, mouthDir: 1 };

// Ghosts
const GHOST_COLORS = ['#ff0000', '#ffb8ff', '#00ffff', '#ffb852'];
let ghosts = [];

function initGhosts() {
  ghosts = [
    { x: 14, y: 11, dir: 'left', color: GHOST_COLORS[0], mode: 'scatter', startDelay: 0 },
    { x: 13, y: 14, dir: 'up', color: GHOST_COLORS[1], mode: 'house', startDelay: 100 },
    { x: 14, y: 14, dir: 'up', color: GHOST_COLORS[2], mode: 'house', startDelay: 200 },
    { x: 15, y: 14, dir: 'up', color: GHOST_COLORS[3], mode: 'house', startDelay: 300 },
  ];
}

function resetPositions() {
  pac = { x: 14, y: 23, dir: 'left', nextDir: 'left', moving: true, mouthAngle: 0, mouthDir: 1 };
  initGhosts();
}

function isWall(x, y) {
  if (x < 0 || x >= COLS || y < 0 || y >= ROWS) return true;
  return grid[y][x] === 0;
}

function canMove(x, y, dir) {
  let nx = x, ny = y;
  if (dir === 'left') nx--;
  if (dir === 'right') nx++;
  if (dir === 'up') ny--;
  if (dir === 'down') ny++;
  // Tunnel wrap
  if (nx < 0) nx = COLS - 1;
  if (nx >= COLS) nx = 0;
  return !isWall(nx, ny);
}

function move(entity, dir) {
  if (dir === 'left') entity.x--;
  if (dir === 'right') entity.x++;
  if (dir === 'up') entity.y--;
  if (dir === 'down') entity.y++;
  // Tunnel wrap
  if (entity.x < 0) entity.x = COLS - 1;
  if (entity.x >= COLS) entity.x = 0;
}

const DIRS = ['up', 'down', 'left', 'right'];
const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };

function ghostAI(ghost, tick) {
  if (ghost.mode === 'house') {
    if (tick > ghost.startDelay) {
      ghost.x = 14;
      ghost.y = 11;
      ghost.mode = 'scatter';
      ghost.dir = 'left';
    }
    return;
  }

  // Target: pac-man position for chase, or scatter to corners
  let tx = pac.x, ty = pac.y;
  if (ghostFrightened > 0) {
    tx = Math.floor(Math.random() * COLS);
    ty = Math.floor(Math.random() * ROWS);
  }

  // Pick best direction (not reverse, not wall)
  let bestDir = ghost.dir;
  let bestDist = Infinity;
  const frightened = ghostFrightened > 0;

  for (const d of DIRS) {
    if (d === OPPOSITE[ghost.dir]) continue;
    if (!canMove(ghost.x, ghost.y, d)) continue;
    let nx = ghost.x + (d === 'left' ? -1 : d === 'right' ? 1 : 0);
    let ny = ghost.y + (d === 'up' ? -1 : d === 'down' ? 1 : 0);
    if (nx < 0) nx = COLS - 1;
    if (nx >= COLS) nx = 0;
    const dist = Math.abs(nx - tx) + Math.abs(ny - ty);
    if (frightened ? dist > bestDist : dist < bestDist) {
      bestDist = dist;
      bestDir = d;
    }
  }

  ghost.dir = bestDir;
  if (canMove(ghost.x, ghost.y, ghost.dir)) {
    move(ghost, ghost.dir);
  }
}

// Drawing
function drawWall(x, y) {
  ctx.fillStyle = '#2121de';
  ctx.fillRect(x * TILE, y * TILE, TILE, TILE);
  // Inner darker square for depth
  ctx.fillStyle = '#1919a6';
  ctx.fillRect(x * TILE + 2, y * TILE + 2, TILE - 4, TILE - 4);
}

function drawDot(x, y) {
  ctx.fillStyle = '#ffb8ae';
  ctx.beginPath();
  ctx.arc(x * TILE + TILE / 2, y * TILE + TILE / 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawPowerPellet(x, y, tick) {
  if (Math.floor(tick / 10) % 2 === 0) {
    ctx.fillStyle = '#ffb8ae';
    ctx.beginPath();
    ctx.arc(x * TILE + TILE / 2, y * TILE + TILE / 2, 5, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPacMan() {
  const cx = pac.x * TILE + TILE / 2;
  const cy = pac.y * TILE + TILE / 2;
  const mouth = pac.mouthAngle * 0.4;
  let startAngle, endAngle;

  if (pac.dir === 'right') { startAngle = mouth; endAngle = Math.PI * 2 - mouth; }
  else if (pac.dir === 'left') { startAngle = Math.PI + mouth; endAngle = Math.PI - mouth; }
  else if (pac.dir === 'up') { startAngle = Math.PI * 1.5 + mouth; endAngle = Math.PI * 1.5 - mouth; }
  else { startAngle = Math.PI * 0.5 + mouth; endAngle = Math.PI * 0.5 - mouth; }

  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, TILE / 2 + 1, startAngle, endAngle);
  ctx.closePath();
  ctx.fill();
}

function drawGhost(ghost) {
  const cx = ghost.x * TILE + TILE / 2;
  const cy = ghost.y * TILE + TILE / 2;
  const r = TILE / 2 + 1;

  ctx.fillStyle = ghostFrightened > 0 ? '#2121de' : ghost.color;
  ctx.beginPath();
  ctx.arc(cx, cy - 2, r, Math.PI, 0);
  ctx.lineTo(cx + r, cy + r - 2);
  // Wavy bottom
  for (let i = 0; i < 3; i++) {
    const bx = cx + r - (i + 1) * (r * 2 / 3);
    ctx.quadraticCurveTo(cx + r - i * (r * 2 / 3) - r / 3, cy + r + 3, bx, cy + r - 2);
  }
  ctx.closePath();
  ctx.fill();

  // Eyes
  const eyeColor = ghostFrightened > 0 ? '#fff' : '#fff';
  const pupilColor = ghostFrightened > 0 ? '#fff' : '#2121de';
  ctx.fillStyle = eyeColor;
  ctx.beginPath();
  ctx.arc(cx - 3, cy - 3, 3, 0, Math.PI * 2);
  ctx.arc(cx + 3, cy - 3, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = pupilColor;
  ctx.beginPath();
  ctx.arc(cx - 3, cy - 3, 1.5, 0, Math.PI * 2);
  ctx.arc(cx + 3, cy - 3, 1.5, 0, Math.PI * 2);
  ctx.fill();
}

function updateLives() {
  livesEl.textContent = '\u{1F7E1}'.repeat(lives);
}

let tick = 0;
let moveCounter = 0;

function update() {
  if (gameState !== 'playing') return;

  tick++;
  moveCounter++;

  // Pac-Man mouth animation
  pac.mouthAngle += 0.15 * pac.mouthDir;
  if (pac.mouthAngle > 1) pac.mouthDir = -1;
  if (pac.mouthAngle < 0) pac.mouthDir = 1;

  // Move pac-man every 4 frames
  if (moveCounter % 4 === 0) {
    if (canMove(pac.x, pac.y, pac.nextDir)) {
      pac.dir = pac.nextDir;
    }
    if (canMove(pac.x, pac.y, pac.dir)) {
      move(pac, pac.dir);
    }

    // Eat dots
    const cell = grid[pac.y][pac.x];
    if (cell === 1) {
      grid[pac.y][pac.x] = 2;
      score += 10;
      dotsEaten++;
      scoreEl.textContent = score;
    } else if (cell === 3) {
      grid[pac.y][pac.x] = 2;
      score += 50;
      dotsEaten++;
      scoreEl.textContent = score;
      ghostFrightened = 150;
    }

    // Win condition
    if (dotsEaten >= totalDots) {
      gameState = 'won';
      overlay.innerHTML = '<div>YOU WIN!</div><div class="sub">Score: ' + score + '</div><div class="sub">Press any key to play again</div>';
      overlay.style.display = 'flex';
      return;
    }
  }

  // Move ghosts every 5 frames (slower than pac-man)
  if (moveCounter % (ghostFrightened > 0 ? 8 : 5) === 0) {
    for (const ghost of ghosts) {
      ghostAI(ghost, tick);
    }
  }

  if (ghostFrightened > 0) ghostFrightened--;

  // Collision detection
  for (let i = 0; i < ghosts.length; i++) {
    const g = ghosts[i];
    if (g.mode === 'house') continue;
    if (g.x === pac.x && g.y === pac.y) {
      if (ghostFrightened > 0) {
        score += 200;
        scoreEl.textContent = score;
        g.x = 14;
        g.y = 11;
        g.dir = 'left';
      } else {
        lives--;
        updateLives();
        if (lives <= 0) {
          gameState = 'lost';
          overlay.innerHTML = '<div>GAME OVER</div><div class="sub">Score: ' + score + '</div><div class="sub">Press any key to play again</div>';
          overlay.style.display = 'flex';
          return;
        }
        resetPositions();
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell === 0) drawWall(c, r);
      else if (cell === 1) drawDot(c, r);
      else if (cell === 3) drawPowerPellet(c, r, tick);
    }
  }

  if (gameState === 'playing') {
    drawPacMan();
    for (const ghost of ghosts) {
      if (ghost.mode !== 'house' || tick > ghost.startDelay - 50) {
        drawGhost(ghost);
      }
    }
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  lives = 3;
  ghostFrightened = 0;
  scoreEl.textContent = '0';
  updateLives();
  buildGrid();
  resetPositions();
  gameState = 'playing';
  overlay.style.display = 'none';
  tick = 0;
  moveCounter = 0;
}

// Input
document.addEventListener('keydown', (e) => {
  if (gameState === 'waiting' || gameState === 'won' || gameState === 'lost') {
    startGame();
    return;
  }
  if (e.key === 'ArrowLeft' || e.key === 'a') pac.nextDir = 'left';
  if (e.key === 'ArrowRight' || e.key === 'd') pac.nextDir = 'right';
  if (e.key === 'ArrowUp' || e.key === 'w') pac.nextDir = 'up';
  if (e.key === 'ArrowDown' || e.key === 's') pac.nextDir = 'down';
  e.preventDefault();
});

// Touch controls
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', (e) => {
  if (gameState !== 'playing') { startGame(); return; }
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
document.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    pac.nextDir = dx > 0 ? 'right' : 'left';
  } else {
    pac.nextDir = dy > 0 ? 'down' : 'up';
  }
});

buildGrid();
updateLives();
gameLoop();
</script>
</body>
</html>
