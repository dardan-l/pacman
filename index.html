<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pac-Man</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
    }
    .header {
      display: flex;
      justify-content: space-between;
      width: 420px;
      padding: 12px 0;
      font-size: 18px;
    }
    .score { color: #fff; }
    .lives { color: #ffff00; letter-spacing: 4px; }
    canvas { display: block; }
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-size: 28px;
      color: #ffff00;
    }
    .overlay .sub { font-size: 14px; color: #aaa; }
  </style>
</head>
<body>
  <div class="header">
    <div class="score">SCORE: <span id="score">0</span></div>
    <div class="lives" id="lives"></div>
  </div>
  <div style="position: relative; display: inline-block;">
    <canvas id="game"></canvas>
    <div class="overlay" id="overlay">
      <div>PAC-MAN</div>
      <div class="sub">Press any key or tap to start</div>
    </div>
  </div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const livesEl = document.getElementById('lives');
const overlay = document.getElementById('overlay');

const TILE = 20;

// W=wall, .=dot, o=power pellet, -=empty, G=ghost house wall, D=ghost door
const MAP_STR = [
  "WWWWWWWWWWWWWWWWWWWWW",
  "W.........W.........W",
  "W.WWW.WWW.W.WWW.WWW.W",
  "WoW W.W W.W.W W.W WoW",
  "W.WWW.WWW.W.WWW.WWW.W",
  "W...................W",
  "W.WWW.W.WWWWW.W.WWW.W",
  "W.WWW.W.WWWWW.W.WWW.W",
  "W.....W...W...W.....W",
  "WWWWW.WWW-W-WWW.WWWWW",
  "----W.W-------W.W----",
  "----W.W-GGDGGtW.W----",
  "WWWWW.W-G---G-W.WWWWW",
  "-----..tG---G-..-----",
  "WWWWW.W-G---G-W.WWWWW",
  "----W.W-GGGGG-W.W----",
  "----W.W-------W.W----",
  "WWWWW.W-WWWWW-W.WWWWW",
  "W.........W.........W",
  "W.WWW.WWW.W.WWW.WWW.W",
  "Wo..W...........W..oW",
  "WWW.W.W.WWWWW.W.W.WWW",
  "W.....W...W...W.....W",
  "W.WWWWWWW.W.WWWWWWW.W",
  "W...................W",
  "WWWWWWWWWWWWWWWWWWWWW",
];

const ROWS = MAP_STR.length;
const COLS = MAP_STR[0].length;

canvas.width = COLS * TILE;
canvas.height = ROWS * TILE;

// Cell types: 0=wall, 1=dot, 2=empty, 3=power pellet, 4=ghost wall, 5=ghost door
function parseCell(ch) {
  if (ch === 'W') return 0;
  if (ch === '.') return 1;
  if (ch === 'o') return 3;
  if (ch === '-' || ch === 't') return 2; // t = tunnel marker, treated as empty
  if (ch === 'G') return 4;
  if (ch === 'D') return 5;
  return 2;
}

let grid = [];
let score = 0;
let lives = 3;
let totalDots = 0;
let dotsEaten = 0;
let gameState = 'waiting';
let ghostFrightened = 0;

function buildGrid() {
  grid = [];
  totalDots = 0;
  dotsEaten = 0;
  for (let r = 0; r < ROWS; r++) {
    grid[r] = [];
    for (let c = 0; c < COLS; c++) {
      grid[r][c] = parseCell(MAP_STR[r][c]);
      if (grid[r][c] === 1 || grid[r][c] === 3) totalDots++;
    }
  }
}

// Pac-Man starts at row 20 (the Wo..W row), col 10 (center)
// Actually let's find a good spot — row 24 center
const PAC_START = { x: 10, y: 18 };

let pac = { x: PAC_START.x, y: PAC_START.y, dir: 'left', nextDir: 'left', mouthAngle: 0, mouthDir: 1 };

const GHOST_COLORS = ['#ff0000', '#ffb8ff', '#00ffff', '#ffb852'];
let ghosts = [];

function initGhosts() {
  ghosts = [
    { x: 10, y: 11, dir: 'left', color: GHOST_COLORS[0], mode: 'chase', home: false, startTick: 0 },
    { x: 9,  y: 13, dir: 'up',   color: GHOST_COLORS[1], mode: 'house', home: true, startTick: 120 },
    { x: 10, y: 13, dir: 'up',   color: GHOST_COLORS[2], mode: 'house', home: true, startTick: 240 },
    { x: 11, y: 13, dir: 'up',   color: GHOST_COLORS[3], mode: 'house', home: true, startTick: 360 },
  ];
}

function resetPositions() {
  pac = { x: PAC_START.x, y: PAC_START.y, dir: 'left', nextDir: 'left', mouthAngle: 0, mouthDir: 1 };
  initGhosts();
}

function isWalkable(x, y, isGhost) {
  if (y < 0 || y >= ROWS) return false;
  // Tunnel wrap: allow off-screen horizontally
  if (x < 0 || x >= COLS) return true;
  const cell = grid[y][x];
  if (cell === 0) return false;   // wall
  if (cell === 4) return false;   // ghost house wall
  if (cell === 5) return !!isGhost; // ghost door — only ghosts pass
  return true;
}

function canMove(x, y, dir, isGhost) {
  let nx = x, ny = y;
  if (dir === 'left') nx--;
  if (dir === 'right') nx++;
  if (dir === 'up') ny--;
  if (dir === 'down') ny++;
  return isWalkable(nx, ny, isGhost);
}

function doMove(entity, dir) {
  if (dir === 'left') entity.x--;
  if (dir === 'right') entity.x++;
  if (dir === 'up') entity.y--;
  if (dir === 'down') entity.y++;
  // Tunnel wrap
  if (entity.x < 0) entity.x = COLS - 1;
  if (entity.x >= COLS) entity.x = 0;
}

const DIRS = ['up', 'down', 'left', 'right'];
const OPPOSITE = { up: 'down', down: 'up', left: 'right', right: 'left' };

function ghostAI(ghost, tick) {
  // Release from house
  if (ghost.mode === 'house') {
    if (tick >= ghost.startTick) {
      ghost.x = 10;
      ghost.y = 11;
      ghost.mode = 'chase';
      ghost.home = false;
      ghost.dir = 'left';
    }
    return;
  }

  // Target
  let tx, ty;
  if (ghostFrightened > 0) {
    tx = Math.floor(Math.random() * COLS);
    ty = Math.floor(Math.random() * ROWS);
  } else {
    tx = pac.x;
    ty = pac.y;
  }

  // Collect valid directions (not reverse, not wall)
  const options = [];
  for (const d of DIRS) {
    if (d === OPPOSITE[ghost.dir]) continue;
    if (!canMove(ghost.x, ghost.y, d, true)) continue;
    options.push(d);
  }

  // If stuck (dead end), allow reverse
  if (options.length === 0) {
    const rev = OPPOSITE[ghost.dir];
    if (canMove(ghost.x, ghost.y, rev, true)) {
      options.push(rev);
    }
  }

  if (options.length === 0) return;

  // Pick best
  let bestDir = options[0];
  let bestDist = Infinity;
  const flee = ghostFrightened > 0;

  for (const d of options) {
    let nx = ghost.x + (d === 'left' ? -1 : d === 'right' ? 1 : 0);
    let ny = ghost.y + (d === 'up' ? -1 : d === 'down' ? 1 : 0);
    if (nx < 0) nx = COLS - 1;
    if (nx >= COLS) nx = 0;
    const dist = (nx - tx) ** 2 + (ny - ty) ** 2;
    if (flee ? dist > bestDist : dist < bestDist) {
      bestDist = dist;
      bestDir = d;
    }
  }

  ghost.dir = bestDir;
  doMove(ghost, ghost.dir);
}

// ---- Drawing ----
function drawWall(x, y) {
  ctx.fillStyle = '#2121de';
  ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
}

function drawGhostWall(x, y) {
  ctx.fillStyle = '#444';
  ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
}

function drawGhostDoor(x, y) {
  ctx.fillStyle = '#ffb8ae';
  ctx.fillRect(x * TILE + 1, y * TILE + TILE / 2 - 2, TILE - 2, 4);
}

function drawDot(x, y) {
  ctx.fillStyle = '#ffb8ae';
  ctx.beginPath();
  ctx.arc(x * TILE + TILE / 2, y * TILE + TILE / 2, 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawPowerPellet(x, y, t) {
  if (Math.floor(t / 15) % 2 === 0) {
    ctx.fillStyle = '#ffb8ae';
    ctx.beginPath();
    ctx.arc(x * TILE + TILE / 2, y * TILE + TILE / 2, 6, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawPacMan() {
  const cx = pac.x * TILE + TILE / 2;
  const cy = pac.y * TILE + TILE / 2;
  const mouth = pac.mouthAngle * 0.45;
  let angle = 0;
  if (pac.dir === 'right') angle = 0;
  else if (pac.dir === 'left') angle = Math.PI;
  else if (pac.dir === 'up') angle = Math.PI * 1.5;
  else angle = Math.PI * 0.5;

  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.moveTo(cx, cy);
  ctx.arc(cx, cy, TILE / 2 + 2, angle + mouth, angle + Math.PI * 2 - mouth);
  ctx.closePath();
  ctx.fill();
}

function drawGhost(ghost) {
  const cx = ghost.x * TILE + TILE / 2;
  const cy = ghost.y * TILE + TILE / 2;
  const r = TILE / 2 + 1;
  const frightened = ghostFrightened > 0;
  const flashing = frightened && ghostFrightened < 60 && Math.floor(ghostFrightened / 8) % 2 === 0;

  ctx.fillStyle = frightened ? (flashing ? '#fff' : '#2121de') : ghost.color;
  ctx.beginPath();
  ctx.arc(cx, cy - 2, r, Math.PI, 0);
  ctx.lineTo(cx + r, cy + r - 2);
  const segments = 4;
  for (let i = 0; i < segments; i++) {
    const sx = cx + r - (i * 2 + 1) * (r / segments);
    const ex = cx + r - (i * 2 + 2) * (r / segments);
    ctx.lineTo(sx, cy + r + 3);
    ctx.lineTo(ex, cy + r - 2);
  }
  ctx.closePath();
  ctx.fill();

  // Eyes
  if (!frightened) {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(cx - 4, cy - 3, 4, 0, Math.PI * 2);
    ctx.arc(cx + 4, cy - 3, 4, 0, Math.PI * 2);
    ctx.fill();
    // Pupils look toward pac-man
    const pdx = Math.sign(pac.x - ghost.x) * 1.5;
    const pdy = Math.sign(pac.y - ghost.y) * 1.5;
    ctx.fillStyle = '#2121de';
    ctx.beginPath();
    ctx.arc(cx - 4 + pdx, cy - 3 + pdy, 2, 0, Math.PI * 2);
    ctx.arc(cx + 4 + pdx, cy - 3 + pdy, 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Frightened face
    ctx.fillStyle = frightened && !flashing ? '#ffb8ae' : '#f00';
    ctx.beginPath();
    ctx.arc(cx - 3, cy - 2, 1.5, 0, Math.PI * 2);
    ctx.arc(cx + 3, cy - 2, 1.5, 0, Math.PI * 2);
    ctx.fill();
    // Wavy mouth
    ctx.strokeStyle = frightened && !flashing ? '#ffb8ae' : '#f00';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(cx - 5, cy + 3);
    for (let i = 0; i < 5; i++) {
      ctx.lineTo(cx - 5 + i * 2.5 + 1.25, cy + (i % 2 === 0 ? 5 : 2));
    }
    ctx.stroke();
  }
}

function updateLives() {
  let s = '';
  for (let i = 0; i < lives; i++) s += '\u25CF ';
  livesEl.textContent = s;
}

let tick = 0;

function update() {
  if (gameState !== 'playing') return;
  tick++;

  // Mouth animation
  pac.mouthAngle += 0.15 * pac.mouthDir;
  if (pac.mouthAngle > 1) pac.mouthDir = -1;
  if (pac.mouthAngle < 0) pac.mouthDir = 1;

  // Move pac-man every 3 ticks
  if (tick % 3 === 0) {
    if (canMove(pac.x, pac.y, pac.nextDir, false)) {
      pac.dir = pac.nextDir;
    }
    if (canMove(pac.x, pac.y, pac.dir, false)) {
      doMove(pac, pac.dir);
    }

    // Eat
    const cell = grid[pac.y][pac.x];
    if (cell === 1) {
      grid[pac.y][pac.x] = 2;
      score += 10;
      dotsEaten++;
      scoreEl.textContent = score;
    } else if (cell === 3) {
      grid[pac.y][pac.x] = 2;
      score += 50;
      dotsEaten++;
      scoreEl.textContent = score;
      ghostFrightened = 180;
      // Reverse all active ghosts
      for (const g of ghosts) {
        if (g.mode !== 'house') g.dir = OPPOSITE[g.dir];
      }
    }

    if (dotsEaten >= totalDots) {
      gameState = 'won';
      overlay.innerHTML = '<div>YOU WIN!</div><div class="sub">Score: ' + score + '</div><div class="sub">Press any key to play again</div>';
      overlay.style.display = 'flex';
      return;
    }
  }

  // Move ghosts every 4 ticks (or 7 when frightened)
  const ghostSpeed = ghostFrightened > 0 ? 7 : 4;
  if (tick % ghostSpeed === 0) {
    for (const ghost of ghosts) {
      ghostAI(ghost, tick);
    }
  }

  if (ghostFrightened > 0) ghostFrightened--;

  // Collision
  for (const g of ghosts) {
    if (g.mode === 'house') continue;
    if (g.x === pac.x && g.y === pac.y) {
      if (ghostFrightened > 0) {
        score += 200;
        scoreEl.textContent = score;
        g.x = 10; g.y = 13; g.mode = 'house'; g.home = true;
        g.startTick = tick + 120;
      } else {
        lives--;
        updateLives();
        if (lives <= 0) {
          gameState = 'lost';
          overlay.innerHTML = '<div>GAME OVER</div><div class="sub">Score: ' + score + '</div><div class="sub">Press any key to play again</div>';
          overlay.style.display = 'flex';
          return;
        }
        resetPositions();
        return;
      }
    }
  }
}

function draw() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = grid[r][c];
      if (cell === 0) drawWall(c, r);
      else if (cell === 4) drawGhostWall(c, r);
      else if (cell === 5) drawGhostDoor(c, r);
      else if (cell === 1) drawDot(c, r);
      else if (cell === 3) drawPowerPellet(c, r, tick);
    }
  }

  if (gameState === 'playing') {
    drawPacMan();
    for (const ghost of ghosts) {
      if (ghost.mode !== 'house') drawGhost(ghost);
      else if (tick >= ghost.startTick - 60) drawGhost(ghost); // fade in before release
    }
  }
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

function startGame() {
  score = 0;
  lives = 3;
  ghostFrightened = 0;
  scoreEl.textContent = '0';
  updateLives();
  buildGrid();
  resetPositions();
  gameState = 'playing';
  overlay.style.display = 'none';
  tick = 0;
}

// Input
document.addEventListener('keydown', (e) => {
  if (gameState !== 'playing') {
    startGame();
    return;
  }
  switch (e.key) {
    case 'ArrowLeft': case 'a': pac.nextDir = 'left'; break;
    case 'ArrowRight': case 'd': pac.nextDir = 'right'; break;
    case 'ArrowUp': case 'w': pac.nextDir = 'up'; break;
    case 'ArrowDown': case 's': pac.nextDir = 'down'; break;
    default: return;
  }
  e.preventDefault();
});

// Touch
let touchX = 0, touchY = 0;
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (gameState !== 'playing') { startGame(); return; }
  touchX = e.touches[0].clientX;
  touchY = e.touches[0].clientY;
}, { passive: false });
canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });
canvas.addEventListener('touchend', (e) => {
  const dx = e.changedTouches[0].clientX - touchX;
  const dy = e.changedTouches[0].clientY - touchY;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
  if (Math.abs(dx) > Math.abs(dy)) pac.nextDir = dx > 0 ? 'right' : 'left';
  else pac.nextDir = dy > 0 ? 'down' : 'up';
});

buildGrid();
updateLives();
gameLoop();
</script>
</body>
</html>
